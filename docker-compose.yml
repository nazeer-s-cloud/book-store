services:

  db:
    image: postgres:15
    container_name: devdocs_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: devdocs
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: devdocs_redis
    restart: always
    ports:
      - "6379:6379"

  

volumes:
  db_data: